name: Airbnb Price Scraper Job

on:
  schedule:
    - cron: '0 3 * * *' # Every day at 3:00 AM UTC
  workflow_dispatch:      # Allows manual triggers from GitHub UI
  repository_dispatch:    # Allows API triggers from Vercel backend
    types: 
      - scrape-all
      - scrape-listing

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Install Puppeteer Chromium Browser Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev wget gnupg
          npx puppeteer browsers install chrome

      - name: Execute Scraper Engine
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ] && [ "${{ github.event.action }}" = "scrape-listing" ]; then
            ROOM_ID="${{ github.event.client_payload.linkId }}"
            echo "Executing fast scrape for single Room ID: $ROOM_ID"
            node src/cron-scraper.js "$ROOM_ID"
          else
            echo "Executing full scrape cycle for all non-expired listings"
            node src/cron-scraper.js
          fi
        env:
          MONGO_URI: ${{ secrets.MONGO_URI || secrets.MONGODB_URI }}
          NODE_ENV: production
