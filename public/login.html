<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Airbnb Price History</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Link stylesheet for vars -->
  <link rel="stylesheet" href="/style.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      position: relative;
    }

    /* Ambient background glowing circles */
    .glow-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      top: 0;
      left: 0;
      z-index: 1;
    }

    .glow-circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
    }

    .circle-1 {
      width: 350px;
      height: 350px;
      background: var(--accent-rose);
      top: 15%;
      left: 10%;
    }

    .circle-2 {
      width: 450px;
      height: 450px;
      background: var(--accent-purple);
      bottom: 10%;
      right: 10%;
    }

    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 1.5rem;
    }

    .login-card {
      background: var(--grad-card);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(12px);
    }

    .login-logo {
      background: var(--grad-rose);
      width: 60px;
      height: 60px;
      border-radius: 16px;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      margin: 0 auto 1.5rem auto;
      box-shadow: 0 8px 20px rgba(255, 56, 92, 0.4);
    }

    .login-title {
      font-family: var(--font-header);
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .login-subtitle {
      color: var(--text-secondary);
      font-size: 0.95rem;
      line-height: 1.5;
      margin-bottom: 2.5rem;
    }

    .btn-google-container {
      display: flex;
      justify-content: center;
      margin-top: 1.5rem;
    }

    .error-toast {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      padding: 0.8rem 1rem;
      border-radius: 10px;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      display: none;
      align-items: center;
      gap: 0.5rem;
      text-align: left;
    }

    .loading-spinner {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 0.8rem;
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-top: 1.5rem;
    }

    .loading-spinner i {
      color: var(--accent-rose);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  <!-- Google Sign In API -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <!-- Glowing effects -->
  <div class="glow-bg">
    <div class="glow-circle circle-1"></div>
    <div class="glow-circle circle-2"></div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <i class="fa-solid fa-chart-line"></i>
      </div>
      <h2 class="login-title">Preço Airbnb</h2>
      <p class="login-subtitle">Acompanhe preços históricos de estadias no Airbnb e tome decisões inteligentes nas suas viagens.</p>
      
      <div id="error-box" class="error-toast">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span id="error-message">Erro ao realizar login.</span>
      </div>

      <div class="btn-google-container" id="google-btn-wrapper">
        <div id="google-signin-btn"></div>
      </div>

      <div id="loading-box" class="loading-spinner">
        <i class="fa-solid fa-circle-notch"></i>
        <span>Validando sua conta no Google...</span>
      </div>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('jwt_token')) {
      window.location.href = '/index.html';
    }

    function showError(msg) {
      const errorBox = document.getElementById('error-box');
      const errorMsg = document.getElementById('error-message');
      errorMsg.textContent = msg;
      errorBox.style.display = 'flex';
      
      document.getElementById('google-btn-wrapper').style.display = 'flex';
      document.getElementById('loading-box').style.display = 'none';
    }

    async function handleCredentialResponse(response) {
      const idToken = response.credential;
      
      // Show loader
      document.getElementById('google-btn-wrapper').style.display = 'none';
      document.getElementById('error-box').style.display = 'none';
      document.getElementById('loading-box').style.display = 'flex';

      try {
        const res = await fetch('/api/auth/google', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ idToken })
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Falha na autenticação do servidor.');
        }

        // Save session credentials
        localStorage.setItem('jwt_token', data.token);
        localStorage.setItem('user_profile', JSON.stringify(data.user));

        // Redirect to dashboard
        window.location.href = '/index.html';
      } catch (err) {
        showError(err.message);
      }
    }

    // Fetch Google Client ID and initialize SDK
    async function initGoogleSignIn() {
      try {
        const res = await fetch('/api/config');
        const config = await res.json();
        
        if (!config.googleClientId) {
          showError('Configuração do Google Client ID ausente no servidor.');
          return;
        }

        google.accounts.id.initialize({
          client_id: config.googleClientId,
          callback: handleCredentialResponse,
          auto_select: false,
          cancel_on_tap_outside: true
        });

        google.accounts.id.renderButton(
          document.getElementById("google-signin-btn"),
          { 
            theme: "filled_blue", 
            size: "large", 
            text: "signin_with", 
            shape: "pill", 
            width: "300"
          }
        );
        
        google.accounts.id.prompt(); // One Tap prompt
      } catch (err) {
        showError('Não foi possível carregar o sistema de autenticação.');
      }
    }

    // Wait for the Google API script to be fully loaded
    window.addEventListener('load', () => {
      // Check if google library is loaded, otherwise poll or wait
      const checkInterval = setInterval(() => {
        if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
          clearInterval(checkInterval);
          initGoogleSignIn();
        }
      }, 100);
    });
  </script>
</body>
</html>
